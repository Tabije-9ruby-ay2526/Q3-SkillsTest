<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <center><h1>Maroon 5 Tickets</h1></center>
        <hr>
        <form>
            <p>STUDENT DETAILS</p>

            <label for="">Full Name</label>
            <input type="text" class="form-control"><br>    
            
            <p>TICKET SELECTION</p>
            <label for="">Quantity (₱250.00  each)</label>
            <input type="number" class="form-control">
        </form><br>

        <div class="payment-details rounded-4">
            <p>PAYMENT DETAILS</p>

            <label for="">Subtotal:</label>
            <input type="text" class="form-control" readonly>

            <label for="">Admin Fee:</label>
            <input type="text" class="form-control" readonly><hr>

            <label for="">Total:</label>
            <input type="text" class="form-control" readonly>
        </div>

            <button type="button" class="btn btn-dark mt-3" onclick="verbNoun()">Total</button>
            <button type="button" class="btn btn-dark mt-3" onclick="window.location.reload()">Reset</button>

    </div>

    <script src="main.js"></script>

</body>
</html>
